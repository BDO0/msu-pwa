<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum Station QR Codes</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .qr-container { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
        .qr-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .qr-card h2 { margin-top: 0; color: #800000; }
        img { width: 250px; height: 250px; border: 5px solid #FBC02D; border-radius: 10px; }
        p { font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>
    <h1>MSU Aga Khan Museum - Station QR Codes</h1>
    <p>Right-click the images below and select "Save Image As..." to download them, or print this page.</p>
    
    <div class="qr-container">
        <div class="qr-card">
            <h2>Station 1</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://msu-pwa.vercel.app/%23/station1" alt="Station 1 QR">
            <p>Weapons & Tools</p>
        </div>
        
        <div class="qr-card">
            <h2>Station 2</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://msu-pwa.vercel.app/%23/station2" alt="Station 2 QR">
            <p>Musical Instruments</p>
        </div>
        
        <div class="qr-card">
            <h2>Station 3</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://msu-pwa.vercel.app/%23/station3" alt="Station 3 QR">
            <p>Animals</p>
        </div>
    </div>
</body>
</html>
