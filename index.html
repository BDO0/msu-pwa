<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSU Aga Khan Museum</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/matchup.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (Modular) will be loaded in firebase-ui.js -->
</head>
<body>
    <!-- Cinematic Splash Screen -->
    <div id="splash-screen" class="splash-screen hidden">
        <div class="splash-bg"></div>
        <div class="splash-content">
            <h1 class="splash-title">MSU Aga Khan Museum</h1>
            <p class="splash-subtitle">Interactive Cultural Experience</p>
            <div class="splash-glow"></div>
        </div>
    </div>

    <header class="app-header" style="display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 20px;">
        <a href="#/" class="logo" style="flex: 1;">MSU Aga Khan Museum</a>
        <button id="btn-sound-toggle" style="background:none;border:none;cursor:pointer;font-size:1.2rem;padding:4px 8px;color:var(--gold);flex-shrink:0;" title="Toggle Sound">🔊</button>
    </header>

    <main id="app-content">
        <!-- Content will be injected here by app.js -->
        <div class="loading">Loading...</div>
    </main>

    <footer style="text-align: center; padding: 0;">
        <a href="#" id="about-link" style="display: block; padding: 16px 20px 6px; font-size: 0.88rem; color: var(--text-muted); text-decoration: none; letter-spacing: 0.05em;">About This Experience</a>
        <a href="#" id="admin-login-link" style="display: block; padding: 8px 20px 20px; font-size: 1rem; color: #ccc; text-decoration: none;">
            &copy; 2026 MSU Aga Khan Museum &middot; Admin Access
        </a>
    </footer>

    <!-- Templates for different views -->
    
    <!-- Home Template -->
    <template id="tmpl-home">
        <div class="view home-view">
            <div class="hero">
                <div class="hero-bg"></div>
                <h1 style="position:relative; z-index:2;">Welcome to the MSU Aga Khan Museum</h1>
                <p id="hero-welcome-text" style="position:relative; z-index:2;">Your cultural journey begins here. Tap 'Scan Station QR' at your first stop.</p>
                <div class="action-buttons" style="position:relative; z-index:2;">
                    <button id="btn-install" class="btn btn-secondary hidden">Install App (Offline Use)</button>
                    <button id="btn-scan-qr" class="btn btn-primary" style="background-color: #FBC02D; color: #333;">📷 Scan Station QR</button>
                    <a href="#/station1" class="btn btn-primary" style="display:none;" id="btn-start-exploring">Start Exploring</a>
                </div>
            </div>

            <!-- Journey Map -->
            <div class="journey-map" id="home-journey-map">
                <div class="journey-node unlocked" data-station="start">
                    <span class="journey-icon">🏛</span>
                    <span class="journey-label">Entrance</span>
                </div>
                <div class="journey-line" data-segment="0"></div>
                <div class="journey-node locked" data-station="station1">
                    <span class="journey-icon">⚔️</span>
                    <span class="journey-label">Station 1</span>
                </div>
                <div class="journey-line" data-segment="1"></div>
                <div class="journey-node locked" data-station="station2">
                    <span class="journey-icon">🎵</span>
                    <span class="journey-label">Station 2</span>
                </div>
                <div class="journey-line" data-segment="2"></div>
                <div class="journey-node locked" data-station="station3">
                    <span class="journey-icon">🐾</span>
                    <span class="journey-label">Station 3</span>
                </div>
                <div class="journey-line" data-segment="3"></div>
                <div class="journey-node locked" data-station="hall">
                    <span class="journey-icon">👑</span>
                    <span class="journey-label">Hall of Masters</span>
                </div>
            </div>

            <div class="progress-section card">
                <div style="display:flex; justify-content: space-between; align-items:baseline; border-bottom: 1px solid var(--border-gold); margin-bottom: 16px; padding-bottom: 10px;">
                    <h2 style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">Your Progress</h2>
                    <span id="visitor-title" style="color: var(--gold); font-weight: 600; font-family: var(--font-heading); font-size: 0.95rem; text-shadow: 0 0 10px rgba(201,168,76,0.3);">Curious Visitor</span>
                </div>
                <p id="overall-progress-text">You have viewed 0 out of 0 artifacts</p>
                <div class="progress-bar-container">
                    <div id="overall-progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
                <div id="completion-message" class="completion-message hidden">
                    <h3>🎉 You have completed the museum exploration!</h3>
                    <button id="btn-register" class="btn btn-primary">Register as Completer</button>
                </div>
            </div>

            <div class="stations-section">
                <h2>Stations</h2>
                <ul class="station-list" id="home-station-list">
                    <!-- Populated via JS -->
                </ul>
            </div>

            <div class="achievements-section card">
                <h2>Achievements & Badges</h2>
                <div class="badges-grid" id="home-badges-list">
                    <div class="badge-item locked" id="badge-station1">
                        <div class="badge-icon">⚔️</div>
                        <div class="badge-name">Explorer</div>
                        <div class="badge-desc">Station 1 Challenge</div>
                    </div>
                    <div class="badge-item locked" id="badge-station2">
                        <div class="badge-icon">🎵</div>
                        <div class="badge-name">Scholar</div>
                        <div class="badge-desc">Word Weaver</div>
                    </div>
                    <div class="badge-item locked" id="badge-station3">
                        <div class="badge-icon">🐾</div>
                        <div class="badge-name">Historian</div>
                        <div class="badge-desc">Darangen Match</div>
                    </div>
                </div>
            </div>

            <div class="completers-section card">
                <h2>Official Completers</h2>
                <ul id="completers-list">
                    <li>Loading...</li>
                </ul>
            </div>
        </div>
    </template>

    <!-- Station Template -->
    <template id="tmpl-station">
        <div class="view station-view">
            <a href="#/" class="back-link">&larr; Back to Dashboard</a>
            <h1 id="station-title" class="page-title">Station Title</h1>
            
            <div class="progress-section card">
                <p id="station-progress-text">You have viewed 0 out of 0 artifacts in this station</p>
                <div class="progress-bar-container">
                    <div id="station-progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="artifacts-grid" id="station-artifacts-list">
                <!-- Populated via JS -->
            </div>

            <!-- Station Challenge (populated by JS per station) -->
            <div id="station-game-section"></div>
        </div>
    </template>

    <!-- Artifact Template -->
    <template id="tmpl-artifact">
        <div class="view artifact-view">
            <a href="#" id="back-to-station" class="back-link">&larr; Back to Station</a>
            
            <div class="artifact-content card">
                <img id="artifact-img" src="" alt="Artifact Image" class="artifact-detail-image">
                <h1 id="artifact-title" class="page-title">Artifact Title</h1>
                <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 18px;">
                    <div class="viewed-badge green hidden" id="artifact-viewed-badge" style="margin-bottom:0;">✓ Viewed</div>
                    <button id="btn-listen" class="btn btn-secondary" style="width: auto; padding: 6px 12px; margin-bottom:0; font-size: 0.85rem; display:flex; align-items:center; gap:6px;">🔊 Listen</button>
                </div>
                
                <div class="artifact-description">
                    <h3>Description</h3>
                    <p id="artifact-desc"></p>
                </div>
                
                <div class="artifact-references">
                    <h3>References</h3>
                    <p id="artifact-refs"></p>
                </div>
            </div>
        </div>
    </template>

    <!-- Game Template -->
    <template id="tmpl-game">
        <div class="view game-view">
            <a href="#" id="back-to-station-from-game" class="back-link">&larr; Back to Station</a>
            
            <div class="game-content card" style="text-align: center;">
                <h1 id="game-title" class="page-title" style="margin-top: 0;">Station Challenge</h1>
                <p id="game-subtitle" style="color: #666; margin-bottom: 20px;">Test your knowledge!</p>
                <div id="game-container"></div>
            </div>
        </div>
    </template>

    <!-- Registration Modal Template -->
    <template id="tmpl-register-modal">
        <div class="modal-overlay" id="register-modal">
            <div class="modal-content card">
                <button class="btn-close" id="btn-close-modal">&times;</button>
                <h2>Register as Completer</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-id">Student ID Number</label>
                        <input type="text" id="reg-id" required>
                    </div>
                    <div id="reg-error" class="error-msg hidden"></div>
                    <div id="reg-success" class="success-msg hidden">Registration successful!</div>
                    <button type="submit" class="btn btn-primary" id="btn-submit-reg">Submit Registration</button>
                </form>
            </div>
        </div>
    </template>

    <!-- Onboarding Modal Template -->
    <template id="tmpl-onboarding-modal">
        <div class="modal-overlay" id="onboarding-modal">
            <div class="modal-content card" style="text-align: center; max-width: 450px;">
                <h2 id="onboard-title">Discover</h2>
                <div id="onboard-slide-0" class="onboard-slide">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🏛️</div>
                    <p>Welcome! This app is your digital guide to the MSU Aga Khan Museum.</p>
                </div>
                <div id="onboard-slide-1" class="onboard-slide hidden">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📷</div>
                    <p>Look for QR codes at each station. Tap 'Scan QR' to unlock artifacts and learn their stories.</p>
                </div>
                <div id="onboard-slide-2" class="onboard-slide hidden">
                    <div style="font-size: 3rem; margin-bottom: 10px;">🏆</div>
                    <p>Complete interactive challenges to earn badges and register as an Official Museum Completer!</p>
                </div>
                
                <div class="onboard-dots" style="margin: 20px 0; display:flex; justify-content:center; gap:8px;">
                    <span class="onboard-dot active" style="width:10px;height:10px;border-radius:50%;background:var(--gold);"></span>
                    <span class="onboard-dot" style="width:10px;height:10px;border-radius:50%;background:rgba(201,168,76,0.3);"></span>
                    <span class="onboard-dot" style="width:10px;height:10px;border-radius:50%;background:rgba(201,168,76,0.3);"></span>
                </div>
                <button id="btn-onboard-next" class="btn btn-primary" style="margin-bottom:0;">Next</button>
            </div>
        </div>
    </template>

    <!-- Admin Login Modal Template -->
    <template id="tmpl-admin-login-modal">
        <div class="modal-overlay" id="admin-login-modal">
            <div class="modal-content card" style="max-width: 400px; text-align: center;">
                <button class="btn-close" id="btn-close-admin-login">&times;</button>
                <div class="admin-header" style="margin-bottom: 20px;">
                    <h2>Admin Access</h2>
                    <p style="font-size: 0.9rem; color: #666;">Please log in to manage museum artifacts.</p>
                </div>
                <form id="admin-login-form">
                    <div class="form-group" style="text-align: left;">
                        <label for="admin-login-email">Email</label>
                        <input type="email" id="admin-login-email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-top: 5px; font-family: inherit;">
                    </div>
                    <div class="form-group" style="text-align: left; margin-top: 15px;">
                        <label for="admin-login-pass">Password</label>
                        <input type="password" id="admin-login-pass" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-top: 5px; font-family: inherit;">
                    </div>
                    <div id="admin-login-error" class="error-msg hidden" style="color: #f44336; margin-top: 15px; margin-bottom: 15px; font-size: 0.9rem;"></div>
                    <button type="submit" class="btn btn-primary" id="btn-admin-login-submit" style="width: 100%; margin-top: 15px;">Login</button>
                </form>
            </div>
        </div>
    </template>

    <!-- Scanner Modal Template -->
    <template id="tmpl-scanner-modal">
        <div class="modal-overlay" id="scanner-modal">
            <div class="modal-content card" style="text-align:center;">
                <button class="btn-close" id="btn-close-scanner">&times;</button>
                <h2>Scan QR Code</h2>
                <p>Point your camera at the station QR code.</p>
                <div id="reader" style="width: 100%; max-width: 400px; margin: 0 auto;"></div>
                <button id="btn-stop-scanner" class="btn btn-secondary" style="margin-top: 15px;">Cancel</button>
            </div>
        </div>
    </template>

    <!-- About Modal Template -->
    <template id="tmpl-about-modal">
        <div class="modal-overlay" id="about-modal">
            <div class="modal-content about-modal-content">
                <button class="btn-close" id="btn-close-about">&times;</button>
                <h2 class="about-heading">About This Experience</h2>
                <div class="about-body">
                    <p>This is not just a museum application.</p>
                    <p>It is a journey through memory, culture, and identity.</p>
                    <p>Each artifact you discover represents a fragment of Maranao heritage—preserved not only to be seen, but to be experienced.</p>
                    <p>As you move through stations, solve challenges, and unlock achievements, you are following a path designed to mirror discovery itself: curiosity, understanding, and mastery.</p>
                    <p>This project exists to bridge tradition and technology—so that cultural heritage does not remain in silence, but continues to be explored by the next generation.</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="js/audio.js"></script>
    <script src="js/html5-qrcode.min.js"></script>
    <!-- Include Firebase configuration logic first -->
    <script type="module" src="js/firebase-ui.js"></script>
    <!-- Include main application logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
